# Pipeline parameters for Microbiome-TDA

# Data preprocessing
preprocessing:
  min_prevalence: 0.05       # Min fraction of samples an OTU must appear in
  min_reads: 1000            # Min total reads per sample
  normalization: "clr"       # clr | relative | rarefaction
  taxonomy_level: "genus"    # phylum | class | order | family | genus | species

# Co-occurrence network
network:
  method: "spearman"         # spearman | sparcc
  threshold: 0.3             # Min absolute correlation for edges
  p_value_cutoff: 0.05       # Significance threshold
  top_n_otus: 200            # Number of most abundant OTUs to include

# TDA parameters
tda:
  maxdim: 2                  # Maximum homological dimension (H0, H1, H2)
  distance_metric: "correlation"  # correlation | braycurtis | jaccard
  filtration: "vietoris_rips"     # vietoris_rips | alpha

# Feature extraction
features:
  betti_curve_points: 100    # Number of sample points for Betti curves
  num_landscapes: 5          # Number of persistence landscapes
  landscape_points: 100      # Sample points per landscape

# Sliding window
sliding_window:
  window_size: 10            # Number of samples per window
  step_size: 1               # Step between windows
  regime_threshold_std: 2.0  # Std deviations for change detection

# Statistical tests
statistics:
  n_permutations: 10000      # Number of permutations for permutation tests
  alpha: 0.05                # Significance level
  multiple_testing: "fdr_bh" # Multiple testing correction method

# Neurotransmitter analysis
neurotransmitter:
  targets:
    - "serotonin"
    - "GABA"
    - "dopamine"
    - "SCFA"
  role_weights:              # Weights for scoring by evidence level
    direct: 1.0
    precursor: 0.5
    modulator: 0.3
  subnetwork_min_otus: 5     # Min OTUs to compute subnetwork topology

# Mycobiome disruption analysis
mycobiome:
  fungal_burden_threshold: 0.01  # Min fungal rel. abundance for "high fungal" group
  comparison_method: "bottleneck" # bottleneck | wasserstein | landscape_distance
  disruption_fungi:          # Fungi to track (see src/mycobiome/disruption.py)
    - "Candida"
    - "Aspergillus"
    - "Malassezia"
    - "Cladosporium"
    - "Penicillium"
    - "Fusarium"

# AMR disruption analysis
amr:
  removal_fractions: [0.1, 0.2, 0.3, 0.5, 0.7]  # For resilience simulation
  hgt_correlation_threshold: 0.3  # Min |corr| for HGT edge detection
