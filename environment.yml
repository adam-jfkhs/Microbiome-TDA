name: microbiome-tda
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12
  - plotly>=5.15
  - networkx>=3.1
  - statsmodels>=0.14
  - pyyaml>=6.0
  - tqdm>=4.65
  - jupyter>=1.0
  - pip
  - pip:
    - giotto-tda>=0.6.0
    - ripser>=0.6.4
    - persim>=0.3.1
    - gudhi>=3.8
    - biom-format>=2.1.14
    - scikit-bio>=0.5.9
    - pingouin>=0.5.3
